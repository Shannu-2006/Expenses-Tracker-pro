<!DOCTYPE html>

<html>

<head>

<title>Login</title>

<link rel="stylesheet"
  href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<div class="form-card login-card">

    <h1>🔐 Login</h1>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="success-message">
        {{ messages[0] }}
    </div>
    {% endif %}
    {% endwith %}

    <form method="POST" class="login-form">

        <input
            type="email"
            name="email"
            placeholder="Enter Email"
            required>

        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required>

        <button type="submit">
            Login
        </button>

    </form>

    <p class="auth-link">
        Don't have an account?
        <a href="/register">Register Here</a>
    </p>

</div>

</div>

</body>

</html>
